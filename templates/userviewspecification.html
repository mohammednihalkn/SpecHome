<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Specifications View</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#000;
    color:#fff;
    min-height:100vh;
    padding:60px 80px;
}

.hero{
    max-width:1200px;
}

.page-label{
    color:#8BFF2A;
    font-size:18px;
    font-weight:700;
    letter-spacing:3px;
    text-transform:uppercase;
    margin-bottom:20px;
    display:block;
}

.hero h1{
    font-size:72px;
    font-weight:800;
    line-height:1;
    max-width:900px;
    margin-bottom:30px;
}

.hero p{
    font-size:24px;
    color:#bdbdbd;
    line-height:1.8;
    max-width:900px;
    margin-bottom:50px;
}

.specification-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:25px;
}

.specification-card{
    background:#0a0a0a;
    border:1px solid #1f1f1f;
    border-radius:20px;
    padding:30px;
    transition:0.3s;
}

.specification-card:hover{
    border-color:#8BFF2A;
    transform:translateY(-4px);
}

.specification-name{
    color:#fff;
    font-size:22px;
    font-weight:600;
    line-height:1.6;
}
.back-link{
    display:block;
    margin-top:40px;
    margin-bottom:40px;
    color:#bdbdbd;
    text-decoration:none;
    font-size:16px;
    font-weight:500;
}

.back-link:hover{
    color:#8BFF2A;
}
</style>
</head>

<body>

<section class="hero">

    <span class="page-label">SPECIFICATIONS</span>

    <h1>
        Device Specifications
    </h1>

    <p>
        View detailed specifications and technical information
        for the selected smartphone model.
    </p>
            <a href="/userhome/" class="back-link">
            Back to User Home
        </a>
    <div class="specification-grid">

        {% for specification in a %}
        <div class="specification-card">
            <div class="specification-name">
                {{ specification.name }}
            </div>
        </div>
        {% endfor %}

    </div>

</section>

</body>
</html>
