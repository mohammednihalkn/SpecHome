<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#000;
    color:#fff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.login-container{
    width:100%;
    max-width:600px;
}

.admin-label{
    color:#8BFF2A;
    font-size:18px;
    font-weight:700;
    letter-spacing:3px;
    text-transform:uppercase;
    margin-bottom:20px;
    display:block;
}

h1{
    font-size:72px;
    font-weight:800;
    line-height:1;
    margin-bottom:30px;
}

.subtitle{
    font-size:22px;
    color:#bdbdbd;
    line-height:1.8;
    margin-bottom:40px;
}

label{
    display:block;
    margin-bottom:10px;
    color:#e0e0e0;
    font-weight:600;
}

input[type="text"],
input[type="password"]{
    width:100%;
    padding:18px 20px;
    background:#111;
    border:1px solid #222;
    border-radius:12px;
    color:white;
    font-size:16px;
    margin-bottom:20px;
    outline:none;
}

input[type="text"]:focus,
input[type="password"]:focus{
    border-color:#8BFF2A;
}

input[type="submit"]{
    background:#8BFF2A;
    color:#000;
    border:none;
    padding:18px 45px;
    border-radius:50px;
    font-size:22px;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
    width:100%;
}

input[type="submit"]:hover{
    transform:translateY(-2px);
}

</style>
</head>

<body>

<div class="login-container">

    <span class="admin-label">ADMIN PANEL</span>

    <h1>Admin Login</h1>

    <p class="subtitle">
        Securely access the administration dashboard to manage
        companies, products and specifications.
    </p>

    <form method="post">

        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username">

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password">

        <input type="submit" value="Login">

    </form>

</div>

</body>
</html>
